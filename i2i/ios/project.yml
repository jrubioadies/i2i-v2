name: i2i
options:
  bundleIdPrefix: com.i2i
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""

targets:
  i2i:
    type: application
    platform: iOS
    sources:
      - i2i
    info:
      path: i2i/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSLocalNetworkUsageDescription: "i2i uses your local network to communicate with paired devices."
        NSBonjourServices:
          - _i2i._tcp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.i2i.app
